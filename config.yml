# Configuration for the session export tool (export_sessions.py).
#
# output_dir: root directory where the exported session Markdown is written.
#   The tool creates <output_dir>/<vendor>/<account>/... under this path.
#   A CLI --output/-o flag overrides this value.
output_dir: /Users/bruce/git/sotvault/agent-sessions

# Optional overrides (uncomment to use):
#
# ChatGPT data export. The macOS app stores conversations locally but ENCRYPTED
# (~/Library/Application Support/com.openai.chat/conversations-v3-<id>/*.data,
# no public way to decrypt), so the only supported route is an official export:
# ChatGPT -> Settings -> Data Controls -> Export Data -> unzip the emailed .zip.
# Point this at the unzipped folder (preferred) or its conversations.json:
# chatgpt_export: /Users/bruce/Downloads/chatgpt-export
# chatgpt_export: /Users/bruce/Downloads/chatgpt-export/conversations.json
#
# Account email to attribute Claude Code / Codex sessions to (they do not record
# a per-session account). Defaults to the current CLI login.
# code_account: bruce@runningbruce.com
#
# Claude chat export directory (contains conversations.json + users.json).
# export_dir: data-42e56224-4665-4b94-b4d5-6e7f0a5ff283-1781575676-74446895-batch-0000
#
# Include assistant thinking / reasoning blocks (collapsed) in the output.
# thinking: false
